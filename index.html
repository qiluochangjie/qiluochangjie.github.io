<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P2P 大厅</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0f1a 0%, #121a2a 50%, #0f172a 100%);
            color: #e2e8f0; min-height: 100vh;
            display: flex; justify-content: center; align-items: flex-start; padding: 20px;
        }
        .container { max-width: 680px; width: 100%; }

        /* Header */
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #60a5fa, #a78bfa); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: #64748b; font-size: 13px; margin-top: 2px; }

        /* Card */
        .card {
            background: #151d2c; border-radius: 16px; padding: 22px;
            border: 1px solid #1f2a3a; position: relative; overflow: hidden;
            transition: all .3s ease;
        }
        .card + .card { margin-top: 12px; }
        .card-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .card-title .badge {
            display: inline-flex; align-items: center; justify-content: center;
            width: 26px; height: 26px; border-radius: 50%;
            background: #3b82f6; color: #fff; font-size: 12px; font-weight: 700;
        }
        .badge.purple { background: #8b5cf6; }
        .badge.green { background: #22c55e; }
        .badge.amber { background: #f59e0b; }

        /* Status dot */
        .status-bar { display: flex; align-items: center; gap: 10px; justify-content: center; padding: 10px 0 0; }
        .dot { width: 11px; height: 11px; border-radius: 50%; background: #475569; transition: .4s; }
        .dot.connected { background: #22c55e; box-shadow: 0 0 12px rgba(34,197,94,.5); }
        .dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
        .dot.error { background: #ef4444; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
        .status-text { font-size: 13px; color: #94a3b8; }

        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 10px 22px; border: none; border-radius: 10px; cursor: pointer;
            font-size: 14px; font-weight: 600; transition: all .2s;
        }
        .btn:active { transform: scale(.96); }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover { background: #2563eb; box-shadow: 0 4px 16px rgba(59,130,246,.3); }
        .btn-primary:disabled { background: #334155; color: #64748b; box-shadow: none; cursor: not-allowed; transform: none; }
        .btn-success { background: #22c55e; color: #fff; }
        .btn-success:hover { background: #16a34a; box-shadow: 0 4px 16px rgba(34,197,94,.3); }
        .btn-warning { background: #f59e0b; color: #000; }
        .btn-warning:hover { background: #d97706; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        .btn-outline { background: transparent; color: #94a3b8; border: 1px solid #334155; }
        .btn-outline:hover { background: #1e293b; color: #e2e8f0; }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .btn-lg { padding: 14px 32px; font-size: 16px; border-radius: 14px; }

        .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

        /* Lobby */
        .lobby-actions { display: flex; gap: 12px; justify-content: center; margin: 8px 0; }
        .lobby-btn {
            flex: 1; padding: 18px 16px; border: 2px dashed #334155; border-radius: 14px;
            background: #0f172a; color: #94a3b8; cursor: pointer; transition: .25s;
            text-align: center; font-size: 14px; font-weight: 600;
        }
        .lobby-btn:hover { border-color: #3b82f6; color: #60a5fa; background: #1a2a4a; }
        .lobby-btn .icon { font-size: 28px; display: block; margin-bottom: 6px; }
        .lobby-btn .sub { font-size: 11px; font-weight: 400; opacity: .6; }

        /* Room code */
        .room-code-box {
            background: #0f172a; border-radius: 12px; padding: 16px;
            text-align: center; margin: 8px 0;
        }
        .room-code {
            font-family: 'Courier New', monospace; font-size: 32px; font-weight: 700;
            letter-spacing: 8px; color: #60a5fa;
        }
        .room-label { font-size: 11px; color: #64748b; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 2px; }

        /* QR */
        .qr-wrap { display: flex; justify-content: center; padding: 12px 0; }
        .qr-wrap canvas, .qr-wrap img { border-radius: 12px; border: 2px solid #334155; padding: 8px; background: #fff; }
        .qr-hint { text-align: center; font-size: 11px; color: #64748b; margin-top: 4px; }

        /* SDP textarea */
        textarea, input[type="text"] {
            width: 100%; padding: 11px 13px;
            border: 1px solid #1f2a3a; border-radius: 10px;
            background: #0f172a; color: #e2e8f0; font-size: 13px;
            font-family: 'Courier New', monospace; transition: border-color .2s;
            resize: vertical;
        }
        textarea:focus, input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.1); }
        textarea { min-height: 70px; }

        /* Chat */
        .chat-msgs { max-height: 160px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
        .chat-msgs .msg { padding: 8px 13px; border-radius: 10px; font-size: 14px; max-width: 80%; word-break: break-word; animation: fadeIn .2s ease; }
        .chat-msgs .msg.me { background: #1e3a5f; align-self: flex-end; }
        .chat-msgs .msg.peer { background: #1a2e1a; align-self: flex-start; }
        .chat-msgs .msg .time { font-size: 10px; opacity: .5; display: block; margin-top: 2px; }
        .msg-row { display: flex; gap: 8px; }
        .msg-row input { flex: 1; font-family: system-ui; }
        .msg-row input::placeholder { color: #475569; }

        /* Log */
        .log {
            max-height: 140px; overflow-y: auto; font-size: 11px;
            font-family: 'Courier New', monospace; padding: 2px 0;
        }
        .log p { padding: 2px 8px; color: #475569; animation: fadeIn .2s ease; }
        .log p.info { color: #60a5fa; }
        .log p.success { color: #4ade80; }
        .log p.error { color: #f87171; }
        .log p.warning { color: #fbbf24; }
        .log p.sys { color: #8b5cf6; }
        .log::-webkit-scrollbar, .chat-msgs::-webkit-scrollbar { width: 4px; }
        .log::-webkit-scrollbar-thumb, .chat-msgs::-webkit-scrollbar-thumb { background: #1f2a3a; border-radius: 99px; }

        /* Hidden */
        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        /* Info tip */
        .tip {
            font-size: 11px; color: #64748b; padding: 8px 12px;
            background: #0f172a; border-radius: 8px; margin-bottom: 10px;
            display: flex; align-items: flex-start; gap: 6px;
        }
        .tip .icon { flex-shrink: 0; margin-top: 1px; }

        /* Responsive */
        @media (max-width: 480px) {
            .container { padding: 0; }
            .card { padding: 16px; }
            .room-code { font-size: 24px; letter-spacing: 4px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>P2P 大厅</h1>
        <p>创建房间 · 分享码/扫码 · 直连通信</p>
    </div>

    <!-- ====== 大厅入口 ====== -->
    <div class="card" id="lobbyCard">
        <div class="card-title"><span class="badge purple">🏠</span> 大厅</div>
        <div class="lobby-actions">
            <button class="lobby-btn" onclick="createRoom()">
                <span class="icon">🏗️</span> 创建房间
                <span class="sub">生成连接码，等待对方加入</span>
            </button>
            <button class="lobby-btn" onclick="showJoin()">
                <span class="icon">🔗</span> 加入房间
                <span class="sub">粘贴连接码或手动输入 SDP</span>
            </button>
        </div>
        <div class="status-bar" id="lobbyStatus">
            <span class="dot" id="dot"></span>
            <span class="status-text" id="statusText">等待操作</span>
        </div>
    </div>

    <!-- ====== 创建房间（房主 / Offer） ====== -->
    <div class="card hidden" id="roomCard">
        <div class="card-title"><span class="badge purple">🏠</span> 我的房间</div>

        <div class="room-code-box" id="roomCodeBox">
            <div class="room-label">房间码</div>
            <div class="room-code" id="roomCode">------</div>
        </div>

        <div class="qr-wrap hidden" id="qrWrap"></div>
        <div class="qr-hint hidden" id="qrHint">对方扫描此二维码即可加入</div>

        <div class="hidden" id="sdpBox" style="margin-top:12px;">
            <textarea id="roomSdp" readonly></textarea>
        </div>

        <div class="actions">
            <button class="btn btn-primary" id="genRoomBtn" onclick="startRoom()">⚡ 生成连接码</button>
            <button class="btn btn-outline btn-sm hidden" id="copyLinkBtn" onclick="copySdpLink()">📋 复制连接码</button>
            <button class="btn btn-warning btn-sm hidden" id="toggleQrBtn" onclick="toggleQr()">📱 切换二维码</button>
            <button class="btn btn-danger btn-sm hidden" id="cancelRoomBtn" onclick="cancelRoom()">取消</button>
        </div>

        <!-- 手动粘贴 Answer 备用 -->
        <div class="hidden" id="manualAnswerWrap" style="margin-top:14px;">
            <div class="tip"><span class="icon">💡</span> 自动连接失败？在此粘贴对方返回的 Answer SDP</div>
            <textarea id="remoteAnswer" placeholder="粘贴 Answer SDP..."></textarea>
            <div class="actions">
                <button class="btn btn-success btn-sm" onclick="receiveAnswer()">🔗 手动完成连接</button>
            </div>
        </div>
    </div>

    <!-- ====== 加入房间（访客 / Answer） ====== -->
    <div class="card hidden" id="joinCard">
        <div class="card-title"><span class="badge green">🔗</span> 加入房间</div>

        <!-- 方式1: 输入连接码 -->
        <div class="tip"><span class="icon">📋</span> 粘贴房间连接码（自动解析为 SDP）</div>
        <textarea id="joinCode" placeholder="粘贴连接码..."></textarea>
        <div class="actions">
            <button class="btn btn-success" onclick="joinByCode()">✅ 解析并加入</button>
        </div>

        <!-- 方式2: 手动输入 SDP -->
        <div style="margin-top:16px;">
            <div class="tip"><span class="icon">📝</span> 或手动粘贴 Offer SDP</div>
            <textarea id="remoteOffer" placeholder="粘贴 Offer SDP..."></textarea>
            <div class="actions">
                <button class="btn btn-outline btn-sm" onclick="joinManual()">手动加入</button>
            </div>
        </div>

        <!-- Answer SDP 输出 -->
        <div class="hidden fade-in" id="joinAnswerWrap" style="margin-top:14px;">
            <textarea id="joinAnswerSdp" readonly></textarea>
            <div class="qr-wrap" id="joinQrWrap"></div>
            <div class="actions">
                <button class="btn btn-warning btn-sm" onclick="copySdp('joinAnswerSdp')">📋 复制 Answer</button>
            </div>
        </div>
    </div>

    <!-- ====== 聊天 ====== -->
    <div class="card hidden" id="chatCard">
        <div class="card-title"><span class="badge green">💬</span> 已建立 P2P 连接</div>
        <div class="chat-msgs" id="chatMsgs"></div>
        <div class="msg-row">
            <input type="text" id="msgInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMsg()" />
            <button class="btn btn-success btn-sm" onclick="sendMsg()">发送</button>
            <button class="btn btn-danger btn-sm" onclick="disconnect()">断开</button>
        </div>
    </div>

    <!-- ====== 日志 ====== -->
    <div class="card" id="logCard">
        <div class="card-title" style="margin-bottom:0;cursor:pointer" onclick="this.nextElementSibling.classList.toggle('hidden')">
            <span class="badge" style="font-size:14px">📋</span> 日志
            <span style="margin-left:auto;font-size:11px;color:#64748b;">点击折叠</span>
        </div>
        <div id="logBody">
            <div class="log" id="log"></div>
        </div>
    </div>
</div>

<script>
    // ==================== State ====================
    let mode = 'lobby';       // 'lobby' | 'room' | 'join' | 'chat'
    let pc = null;
    let dc = null;
    let connected = false;
    let savedOffer = null;
    let roomCode = '';
    let bc = null;

    const cfg = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun.cloudflare.com:3478' },
            { urls: 'stun:stun.nextcloud.com:443' },
        ]
    };

    // ==================== DOM ====================
    const $ = id => document.getElementById(id);

    function setStatus(state, text) {
        $('dot').className = 'dot ' + state;
        $('statusText').textContent = text;
    }

    function log(msg, type = 'info') {
        const p = document.createElement('p');
        p.className = type;
        p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        $('log').appendChild(p);
        $('log').scrollTop = $('log').scrollHeight;
    }

    async function copySdp(id) {
        try { await navigator.clipboard.writeText($(id).value); log('已复制', 'success'); }
        catch { log('复制失败，请手动选中', 'error'); }
    }

    async function copySdpLink() {
        const txt = $('roomSdp').value;
        if (!txt) return;
        try {
            await navigator.clipboard.writeText(txt);
            log('连接码已复制，发送给对方即可', 'success');
        } catch { log('复制失败', 'error'); }
    }

    function showCards(ids) {
        ['lobbyCard','roomCard','joinCard','chatCard'].forEach(id => {
            const el = $(id);
            if (ids.includes(id)) { el.classList.remove('hidden'); }
            else { el.classList.add('hidden'); }
        });
    }

    // ==================== QR Code ====================
    function genQr(data, wrapId) {
        const wrap = $(wrapId);
        wrap.innerHTML = '';
        wrap.classList.remove('hidden');
        try {
            const qr = qrcode(0, 'M');
            qr.addData(data);
            qr.make();
            const img = qr.createImgTag(4, 8);
            wrap.innerHTML = img;
        } catch (e) {
            log('二维码生成失败', 'error');
            wrap.classList.add('hidden');
        }
    }

    function toggleQr() {
        const wrap = $('qrWrap');
        if (wrap.classList.contains('hidden')) {
            const sdp = $('roomSdp').value;
            if (sdp) { genQr(sdp, 'qrWrap'); $('qrHint').classList.remove('hidden'); }
        } else {
            wrap.classList.add('hidden');
            $('qrHint').classList.add('hidden');
        }
    }

    // ==================== Room code ====================
    function genRoomCode() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        let code = '';
        for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
        return code;
    }

    // ==================== BroadcastChannel ====================
    function initBC() {
        try {
            bc = new BroadcastChannel('p2p-lobby');
            bc.onmessage = (e) => {
                const m = e.data;
                log(`收到广播: ${m.type}`, 'sys');
                if (m.type === 'offer') {
                    if (mode === 'join') { autoReceiveOffer(m.sdp); }
                } else if (m.type === 'answer') {
                    if (mode === 'room') { autoReceiveAnswer(m.sdp); }
                }
            };
            log('同机自动信令已就绪', 'success');
        } catch { log('同机自动信令不可用', 'info'); }
    }

    function broadcast(type, sdp) {
        if (!bc) return;
        try { bc.postMessage({ type, sdp }); } catch {}
    }

    // ==================== WebRTC ====================
    function createPC() {
        if (pc) { try { pc.close(); } catch {} }
        pc = new RTCPeerConnection(cfg);

        pc.onicecandidate = (e) => {
            if (!e.candidate) {
                const sdpStr = JSON.stringify(pc.localDescription);
                if (mode === 'room') {
                    $('roomSdp').value = sdpStr;
                    $('sdpBox').classList.remove('hidden');
                    genQr(sdpStr, 'qrWrap');
                    $('qrHint').classList.remove('hidden');
                    log('连接码已生成（已在二维码中）', 'success');
                    broadcast('offer', sdpStr);
                } else if (mode === 'join') {
                    $('joinAnswerSdp').value = sdpStr;
                    $('joinAnswerWrap').classList.remove('hidden');
                    genQr(sdpStr, 'joinQrWrap');
                    log('Answer 已生成，正在发送...', 'success');
                    broadcast('answer', sdpStr);
                }
            }
        };

        pc.oniceconnectionstatechange = () => {
            const s = pc.iceConnectionState;
            log(`ICE: ${s}`, 'sys');
            if (s === 'connected' || s === 'completed') {
                connected = true;
                setStatus('connected', '✅ P2P 已连接');
                onConnected();
            } else if (s === 'failed') {
                setStatus('error', '❌ 连接失败');
                connected = false;
            } else if (s === 'disconnected' && connected) {
                setStatus('error', '❌ 已断开');
                connected = false;
            }
        };

        pc.ondatachannel = (e) => setupDC(e.channel);
        return pc;
    }

    function setupDC(channel) {
        dc = channel;
        dc.onopen = () => { log('DataChannel 打开', 'success'); connected = true; setStatus('connected', '✅ P2P 已连接'); onConnected(); };
        dc.onclose = () => { /* handled by ice state */ };
        dc.onmessage = (e) => {
            const t = new Date().toLocaleTimeString();
            log(`收到: ${e.data}`, 'success');
            const d = document.createElement('div'); d.className = 'msg peer';
            d.innerHTML = `对方: ${e.data} <span class="time">${t}</span>`;
            $('chatMsgs').appendChild(d); $('chatMsgs').scrollTop = $('chatMsgs').scrollHeight;
        };
    }

    function onConnected() {
        mode = 'chat';
        showCards(['chatCard']);
        log('🎉 P2P 直连成功！', 'success');
    }

    // ==================== 大厅 → 创建房间 ====================
    function createRoom() {
        mode = 'room';
        roomCode = genRoomCode();
        $('roomCode').textContent = roomCode;
        $('roomCodeBox').classList.remove('hidden');
        showCards(['lobbyCard', 'roomCard']);
        // 重置
        ['roomSdp','remoteAnswer'].forEach(id => $(id).value = '');
        $('sdpBox').classList.add('hidden');
        $('qrWrap').classList.add('hidden');
        $('qrHint').classList.add('hidden');
        $('manualAnswerWrap').classList.add('hidden');
        $('genRoomBtn').classList.remove('hidden');
        $('cancelRoomBtn').classList.remove('hidden');
        $('copyLinkBtn').classList.add('hidden');
        $('toggleQrBtn').classList.add('hidden');
        setStatus('idle', '⏹ 点击生成连接码');
        log('进入房间创建模式', 'sys');
    }

    async function startRoom() {
        $('genRoomBtn').disabled = true;
        $('genRoomBtn').textContent = '⏳ 生成中...';
        setStatus('connecting', '⏳ 生成连接...');

        try {
            createPC();
            dc = pc.createDataChannel('chat', { negotiated: true, id: 0 });
            setupDC(dc);
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            savedOffer = JSON.stringify(pc.localDescription);

            // 预填（ICE 收集完后会更新完整版到 QR）
            $('roomSdp').value = savedOffer;
            $('sdpBox').classList.remove('hidden');

            $('genRoomBtn').classList.add('hidden');
            $('copyLinkBtn').classList.remove('hidden');
            $('toggleQrBtn').classList.remove('hidden');
            $('manualAnswerWrap').classList.remove('hidden');

            log('连接码已生成，对方扫码或粘贴即可加入', 'success');
        } catch (err) {
            log(`创建失败: ${err.message}`, 'error');
            setStatus('error', '❌ 创建失败');
            $('genRoomBtn').disabled = false;
            $('genRoomBtn').textContent = '⚡ 生成连接码';
        }
    }

    function cancelRoom() {
        cleanup();
        mode = 'lobby';
        showCards(['lobbyCard']);
        setStatus('idle', '⏹ 已取消');
        log('已取消', 'sys');
    }

    // ==================== 大厅 → 加入房间 ====================
    function showJoin() {
        mode = 'join';
        showCards(['lobbyCard', 'joinCard']);
        ['joinCode','remoteOffer','joinAnswerSdp'].forEach(id => $(id).value = '');
        $('joinAnswerWrap').classList.add('hidden');
        setStatus('idle', '⏹ 等待输入连接码');
        log('进入加入房间模式', 'sys');
    }

    async function joinByCode() {
        const code = $('joinCode').value.trim();
        if (!code) { log('请粘贴连接码', 'error'); return; }
        await doJoin(code);
    }

    async function joinManual() {
        const txt = $('remoteOffer').value.trim();
        if (!txt) { log('请粘贴 Offer SDP', 'error'); return; }
        await doJoin(txt);
    }

    async function doJoin(sdp) {
        setStatus('connecting', '⏳ 加入房间...');
        log('处理连接码...', 'info');
        try {
            const desc = JSON.parse(sdp);
            createPC();
            await pc.setRemoteDescription(new RTCSessionDescription(desc));
            log('远程 Offer 已设置', 'info');

            dc = pc.createDataChannel('chat', { negotiated: true, id: 0 });
            setupDC(dc);

            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            log('Answer 已生成', 'info');
        } catch (err) {
            log(`加入失败: ${err.message}`, 'error');
            setStatus('error', '❌ 加入失败');
        }
    }

    // ==================== Auto receive (BroadcastChannel) ====================
    async function autoReceiveOffer(sdp) {
        log('自动接收 Offer...', 'info');
        $('joinCode').value = sdp;
        await doJoin(sdp);
    }

    async function autoReceiveAnswer(sdp) {
        log('自动接收 Answer...', 'info');
        $('remoteAnswer').value = sdp;
        await doReceiveAnswer(sdp);
    }

    // ==================== Manual receive Answer ====================
    async function receiveAnswer() {
        const txt = $('remoteAnswer').value.trim();
        if (!txt) { log('请粘贴 Answer SDP', 'error'); return; }
        await doReceiveAnswer(txt);
    }

    async function doReceiveAnswer(sdp) {
        if (!pc) { log('连接失效，请取消后重试', 'error'); setStatus('error'); return; }
        log(`信令状态: ${pc.signalingState}`, 'sys');

        if (pc.signalingState !== 'have-local-offer') {
            log(`状态异常 (${pc.signalingState})，尝试恢复...`, 'warning');
            if (savedOffer) {
                try {
                    const old = pc; pc = null; try { old.close(); } catch {}
                    createPC();
                    dc = pc.createDataChannel('chat', { negotiated: true, id: 0 });
                    setupDC(dc);
                    await pc.setLocalDescription(new RTCSessionDescription(JSON.parse(savedOffer)));
                    log('状态已恢复', 'success');
                } catch (e) {
                    log(`恢复失败: ${e.message}，请取消重试`, 'error');
                    setStatus('error'); return;
                }
            } else {
                log('无备份 Offer，请取消房间后重新创建', 'error');
                setStatus('error'); return;
            }
        }

        try {
            await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(sdp)));
            log('Answer 已设置，连接建立中...', 'success');
        } catch (err) {
            log(`设置 Answer 失败: ${err.message}`, 'error');
            setStatus('error');
        }
    }

    // ==================== Chat ====================
    function sendMsg() {
        const inp = $('msgInput');
        const txt = inp.value.trim();
        if (!txt) return;
        if (!dc || dc.readyState !== 'open') { log('连接未就绪', 'error'); return; }
        dc.send(txt);
        const t = new Date().toLocaleTimeString();
        log(`发送: ${txt}`, 'info');
        const d = document.createElement('div'); d.className = 'msg me';
        d.innerHTML = `我: ${txt} <span class="time">${t}</span>`;
        $('chatMsgs').appendChild(d); $('chatMsgs').scrollTop = $('chatMsgs').scrollHeight;
        inp.value = '';
    }

    // ==================== Cleanup ====================
    function cleanup() {
        try { dc && dc.close(); } catch {}
        try { pc && pc.close(); } catch {}
        pc = null; dc = null; connected = false; savedOffer = null;
    }

    function disconnect() {
        cleanup();
        mode = 'lobby';
        showCards(['lobbyCard']);
        setStatus('idle', '⏹ 已断开');
        log('已断开连接', 'error');
        $('chatMsgs').innerHTML = '';
    }

    // ==================== Init ====================
    initBC();
    log('P2P 大厅已就绪', 'sys');
</script>
</body>
</html>
